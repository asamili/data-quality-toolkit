# See https://pre-commit.com for more information
default_language_version:
  python: python3.12

repos:
  # General fixes and checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        exclude: \.ipynb$
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending
        args: ['--fix=lf']
        exclude: '\.ps1$'

  # Python formatting (Phase 1+)
  - repo: https://github.com/psf/black
    rev: 26.1.0
    hooks:
      - id: black
        language_version: python3.12
        args: ['--line-length=100']

  - repo: https://github.com/PyCQA/isort
    rev: 6.0.1
    hooks:
      - id: isort
        args: ['--profile=black', '--line-length=100']

  # Python linting (Phase 1+)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.10
    hooks:
      - id: ruff
        args: ['--fix', '--exit-non-zero-on-fix']

  # Type checking (Phase 1+)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.17.1
    hooks:
      - id: mypy
        args: ['--ignore-missing-imports']
        additional_dependencies:
          - types-PyYAML
          - types-python-dateutil

  # Coverage/Pytest Setup
  - repo: local
    hooks:
      - id: pytest-focused
        name: pytest (focused)
        entry: pytest -q tests/unit/assessment/test_duplicate_columns.py tests/unit/assessment/test_blank_column_names.py tests/unit/assessment/test_padded_column_names.py tests/unit/assessment/test_placeholder_column_names.py --no-cov
        language: python
        additional_dependencies:
          - pytest
          - pytest-cov
          - "pydantic>=2.6,<2.10"
          - "pydantic-settings>=2.2.1"
        types: [python]
        pass_filenames: false

  # Add safety/security scans
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args: ["-ll", "-iii", "-r", "src/"]

  # pip-audit for dependency CVEs (manual stage: opt-in, avoids blocking
  # offline commits on a network advisory-DB lookup).
  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit (dependency CVEs)
        entry: pip-audit
        language: python
        additional_dependencies:
          - pip-audit>=2.7.0
        pass_filenames: false
        stages: [manual]

  # docformatter for consistent docstring wrapping.

  # check-docstring-first hook from pre-commit-hooks.

# Configuration
fail_fast: false
exclude: |
  (?x)^(
    .*\.egg-info/|
    \.git/|
    \.tox/|
    \.venv/|
    _build/|
    build/|
    dist/|
    docs/_build/|
    .*\.pyc|
    .*\.pyo|
    htmlcov/|
    \.pytest_cache/|
    \.mypy_cache/|
    venv/
  )
